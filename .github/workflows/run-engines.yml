name: Run Engines

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Call Engine Endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://resolveiq-f7ed.vercel.app/api/run-engines